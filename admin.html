<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Admin Panel — Kedai Atap</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <style>
    :root {
      --bg: #F3F3F0; --black: #141515; --white: #F3F3F0;
      --orange: #D7792B; --green: #659941; --red: #c0392b;
      --border: 3px solid #141515;
      --shadow: 5px 5px 0 #141515;
      --shadow-lg: 8px 8px 0 #141515;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--black); font-family: 'Poppins', sans-serif; font-size: 15px; line-height: 1.5; }
    a { color: inherit; text-decoration: none; }
    input, select, textarea, button { font-family: inherit; }

    /* ── LOGIN SCREEN ── */
    #screen-login {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--black);
    }
    .login-card {
      background: var(--bg); border: var(--border); box-shadow: var(--shadow-lg);
      padding: 3rem 3.5rem; text-align: center; max-width: 400px; width: 90%;
    }
    .login-logo {
      font-size: 3rem; font-weight: 800; letter-spacing: .04em;
      line-height: 1; margin-bottom: .2rem; color: var(--orange);
    }
    .login-sub { font-size: .65rem; text-transform: uppercase; letter-spacing: .2em; color: #666; margin-bottom: 2rem; }
    .login-form { display: flex; flex-direction: column; gap: .8rem; text-align: left; }
    .login-form label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #555; }
    .login-form input {
      width: 100%; padding: .75rem 1rem;
      border: var(--border); background: var(--white);
      font-size: .9rem; font-family: 'Poppins', sans-serif;
      transition: box-shadow .15s;
    }
    .login-form input:focus { outline: none; box-shadow: 4px 4px 0 var(--orange); }
    .btn-login {
      width: 100%; padding: .9rem; margin-top: .4rem;
      background: var(--black); color: var(--white); border: none;
      font-size: .82rem; font-weight: 700; font-family: 'Poppins', sans-serif;
      text-transform: uppercase; letter-spacing: .08em;
      cursor: pointer; box-shadow: var(--shadow); transition: transform .1s, box-shadow .1s;
    }
    .btn-login:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-lg); }
    .btn-login:disabled { opacity: .6; pointer-events: none; }
    .login-error {
      font-size: .72rem; color: var(--red); background: #fff0f0;
      border: 1.5px solid var(--red); padding: .6rem .9rem;
      display: none;
    }
    .login-note { font-size: .65rem; color: #aaa; margin-top: 1rem; text-align: center; }

    /* ── ADMIN SCREEN ── */
    #screen-admin { display: none; min-height: 100vh; flex-direction: column; }
    .a-nav {
      position: sticky; top: 0; z-index: 100;
      background: var(--black); border-bottom: var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2rem; height: 60px;
    }
    .a-nav-brand { color: var(--orange); font-weight: 800; font-size: 1.05rem; letter-spacing: .04em; }
    .a-nav-brand span { color: #555; font-size: .7rem; font-weight: 400; margin-left: .5rem; text-transform: uppercase; letter-spacing: .1em; }
    .a-nav-right { display: flex; align-items: center; gap: 1rem; }
    .a-user-email { font-size: .7rem; color: #6a7580; }
    .btn-sm {
      padding: .4rem 1rem; font-size: .65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      border: 2px solid var(--white); color: var(--white);
      background: transparent; cursor: pointer; transition: background .15s;
    }
    .btn-sm:hover { background: #1e2020; }
    .btn-sm-red { border-color: #c0392b; color: #e57373; }
    .btn-sm-red:hover { background: #2d0a0a; }

    .a-main { padding: 2rem 2.5rem; max-width: 1100px; margin: 0 auto; width: 100%; }
    .a-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; border-bottom: var(--border); padding-bottom: 1.5rem; }
    .a-header h1 { font-size: 1.6rem; font-weight: 800; }
    .btn-primary {
      background: var(--orange); color: var(--black); border: var(--border);
      padding: .7rem 1.6rem; font-size: .75rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      cursor: pointer; box-shadow: var(--shadow); transition: transform .1s, box-shadow .1s;
    }
    .btn-primary:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-lg); }
    .btn-primary:active { transform: translate(3px,3px); box-shadow: 1px 1px 0 var(--black); }
    .btn-primary:disabled { opacity: .6; pointer-events: none; }

    /* Article List */
    #a-list { display: flex; flex-direction: column; gap: 0; }
    .a-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 1.5rem; border: var(--border); border-bottom: none;
      transition: background .15s;
    }
    .a-item:last-child { border-bottom: var(--border); }
    .a-item:hover { background: #f9f8f4; }
    .a-item-info { display: flex; align-items: center; gap: 1rem; flex: 1; min-width: 0; }
    .a-cat-tag {
      font-size: .58rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
      padding: .15rem .5rem; border: 1.5px solid var(--black); white-space: nowrap;
      background: var(--black); color: var(--white);
    }
    .a-item-title { font-weight: 700; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .a-item-date { font-size: .68rem; color: #888; white-space: nowrap; }
    .a-item-actions { display: flex; gap: .5rem; flex-shrink: 0; margin-left: 1rem; }
    .btn-edit, .btn-del {
      padding: .35rem .9rem; font-size: .65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      border: 2px solid var(--black); cursor: pointer; transition: background .15s;
    }
    .btn-edit { background: var(--white); }
    .btn-edit:hover { background: var(--orange); }
    .btn-del { background: var(--white); color: var(--red); border-color: var(--red); }
    .btn-del:hover { background: var(--red); color: var(--white); }

    .a-empty { text-align: center; padding: 4rem 2rem; color: #888; }
    .a-empty p { font-size: .9rem; margin-bottom: 1rem; }
    .a-loading { text-align: center; padding: 3rem; color: #888; font-size: .88rem; }
    .a-count { font-size: .7rem; color: #888; font-weight: 400; margin-left: .5rem; }

    /* ── MODAL ── */
    #modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 900;
      align-items: flex-start; justify-content: center;
      padding: 1.5rem 1rem; overflow-y: auto;
    }
    .modal-card {
      background: var(--bg); border: var(--border); box-shadow: var(--shadow-lg);
      max-width: 780px; width: 100%; margin: auto;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
    .modal-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 1.8rem; border-bottom: var(--border);
      background: var(--black); color: var(--white);
    }
    .modal-hdr h2 { font-size: 1.1rem; font-weight: 800; letter-spacing: .02em; }
    .btn-close {
      background: transparent; border: none; color: var(--white);
      font-size: 1.3rem; cursor: pointer; line-height: 1; padding: 0 .3rem;
      transition: color .15s;
    }
    .btn-close:hover { color: var(--orange); }

    #art-form { padding: 1.8rem; display: flex; flex-direction: column; gap: 1.2rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    .form-group { display: flex; flex-direction: column; gap: .4rem; }
    .form-group label { font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; }
    .form-group small { font-weight: 400; text-transform: none; letter-spacing: 0; color: #888; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: .65rem .9rem;
      border: var(--border); background: var(--white);
      font-size: .88rem; color: var(--black);
      transition: box-shadow .15s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; box-shadow: 4px 4px 0 var(--orange);
    }
    .form-group textarea { resize: vertical; }
    .img-preview { margin-top: .5rem; max-height: 140px; object-fit: cover; width: 100%; border: 2px solid #ddd; display: none; }
    .isi-preview {
      margin-top: .8rem; padding: 1.2rem; border: 2px dashed #ccc;
      background: #fff; font-size: .88rem; line-height: 1.8; display: none;
    }
    .isi-preview h3 { font-size: 1.1rem; margin: 1rem 0 .4rem; }
    .isi-preview p { margin-bottom: .8rem; }
    .isi-preview ul { padding-left: 1.4rem; margin-bottom: .8rem; }
    .isi-format { font-size: .65rem; color: #999; margin-top: .3rem; line-height: 1.6; }
    .btn-preview {
      background: transparent; border: 2px solid #ccc; padding: .3rem .8rem;
      font-size: .65rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .06em; cursor: pointer; margin-top: .5rem;
      transition: border-color .15s, background .15s;
    }
    .btn-preview:hover { border-color: var(--black); background: #f0f0ec; }
    .form-actions {
      display: flex; justify-content: flex-end; gap: 1rem;
      padding-top: 1rem; border-top: 2px solid #e5e5e2;
    }
    .btn-sec {
      padding: .65rem 1.4rem; background: transparent; border: var(--border);
      font-size: .75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; cursor: pointer; transition: background .15s;
    }
    .btn-sec:hover { background: #e8e8e4; }

    /* ── RICH TEXT EDITOR ── */
    .editor-wrap { border: var(--border); background: var(--white); }
    .editor-toolbar {
      display: flex; gap: .3rem; flex-wrap: wrap;
      padding: .5rem .6rem; background: #f0f0ec;
      border-bottom: var(--border);
    }
    .ed-btn {
      padding: .28rem .55rem; min-width: 30px; text-align: center;
      background: var(--white); border: 1.5px solid #aaa;
      font-size: .8rem; font-weight: 700; cursor: pointer;
      transition: background .1s, border-color .1s; line-height: 1.4;
    }
    .ed-btn:hover { background: var(--orange); border-color: var(--black); }
    .ed-sep { width: 1px; background: #ccc; margin: .2rem .1rem; align-self: stretch; }
    .editor-content {
      min-height: 220px; max-height: 400px;
      padding: 1rem 1.1rem; overflow-y: auto;
      font-size: .9rem; line-height: 1.85; outline: none;
      color: var(--black);
    }
    .editor-content:focus { box-shadow: inset 0 0 0 3px var(--orange); }
    .editor-content h3 { font-family: 'Poppins',sans-serif; font-size: 1.05rem; font-weight: 700; margin: 1rem 0 .3rem; }
    .editor-content p { margin-bottom: .8rem; }
    .editor-content ul { padding-left: 1.4rem; margin-bottom: .8rem; }
    .editor-content li { margin-bottom: .2rem; }
    .editor-content b, .editor-content strong { font-weight: 800; }
    .editor-content i, .editor-content em { font-style: italic; color: var(--orange); }
    .editor-empty { color: #bbb; pointer-events: none; }

    /* Responsive */
    @media(max-width:640px) {
      .a-main { padding: 1.5rem 1rem; }
      .a-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .form-row { grid-template-columns: 1fr; }
      .a-item { flex-direction: column; align-items: flex-start; gap: .8rem; }
      .a-item-actions { width: 100%; }
      .a-nav { padding: 0 1rem; }
      #art-form { padding: 1.2rem; }
    }
  </style>
</head>

<body>

  <!-- ══ LOGIN SCREEN ══ -->
  <div id="screen-login">
    <div class="login-card">
      <div class="login-logo">KEDAI<br>ATAP</div>
      <div class="login-sub">Panel Admin</div>
      <div class="login-form">
        <div>
          <label for="login-email">Email</label>
          <input id="login-email" type="email" placeholder="admin@kedaiatap.com" autocomplete="email" />
        </div>
        <div>
          <label for="login-pass">Password</label>
          <input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password" />
        </div>
        <div id="login-error" class="login-error"></div>
        <button id="btn-login" class="btn-login">Masuk</button>
      </div>
      <p class="login-note">Akses terbatas untuk admin Kedai Atap.</p>
    </div>
  </div>

  <!-- ══ ADMIN SCREEN ══ -->
  <div id="screen-admin">
    <nav class="a-nav">
      <div class="a-nav-brand">KEDAI ATAP <span>Admin Panel</span></div>
      <div class="a-nav-right">
        <span class="a-user-email" id="a-user-email"></span>
        <a href="index.html" class="btn-sm">← Website</a>
        <button id="btn-logout" class="btn-sm btn-sm-red">Logout</button>
      </div>
    </nav>

    <main class="a-main">
      <div class="a-header">
        <h1>Artikel &amp; Cerita <span class="a-count" id="a-count"></span></h1>
        <button id="btn-new" class="btn-primary">+ Tambah Artikel</button>
      </div>
      <div id="a-list">
        <div class="a-loading">Memuat artikel...</div>
      </div>
    </main>
  </div>

  <!-- ══ MODAL FORM ══ -->
  <div id="modal">
    <div class="modal-card">
      <div class="modal-hdr">
        <h2 id="modal-title">Tambah Artikel</h2>
        <button id="modal-close" class="btn-close" aria-label="Tutup">✕</button>
      </div>
      <form id="art-form" novalidate>
        <div class="form-row">
          <div class="form-group" style="grid-column:1/-1">
            <label>Judul Artikel *</label>
            <input id="f-judul" type="text" required placeholder="Masukkan judul artikel..." />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Kategori *</label>
            <select id="f-kategori" required>
              <option value="kopi">☕ Kopi</option>
              <option value="ruang">🏠 Ruang</option>
              <option value="komunitas">🤝 Komunitas</option>
              <option value="tips">💡 Tips</option>
            </select>
          </div>
          <div class="form-group">
            <label>Tanggal <small>(isi otomatis, bisa diubah)</small></label>
            <input id="f-tanggal" type="text" placeholder="e.g. 27 Maret 2026" />
          </div>
        </div>
        <div class="form-group">
          <label>Ringkasan * <small>— 1-2 kalimat untuk preview card</small></label>
          <textarea id="f-ringkasan" rows="2" required placeholder="Tulis ringkasan singkat artikel..."></textarea>
        </div>
        <div class="form-group">
          <label>URL Gambar *</label>
          <input id="f-gambar" type="url" required placeholder="https://images.unsplash.com/..." />
          <img id="img-preview" class="img-preview" alt="Preview gambar" />
        </div>
        <div class="form-group">
          <label>Isi Artikel *</label>
          <div class="editor-wrap">
            <div class="editor-toolbar" id="editor-toolbar">
              <button type="button" class="ed-btn" data-cmd="bold" title="Bold"><b>B</b></button>
              <button type="button" class="ed-btn" data-cmd="italic" title="Italic"><i>I</i></button>
              <button type="button" class="ed-btn" data-cmd="underline" title="Underline"><u>U</u></button>
              <div class="ed-sep"></div>
              <button type="button" class="ed-btn" data-cmd="formatBlock" data-val="h3" title="Subheading / Judul Sub" style="font-size:.75rem">Sub</button>
              <button type="button" class="ed-btn" data-cmd="formatBlock" data-val="p" title="Teks normal">Aa</button>
              <div class="ed-sep"></div>
              <button type="button" class="ed-btn" data-cmd="insertUnorderedList" title="Bullet List">• List</button>
              <div class="ed-sep"></div>
              <button type="button" class="ed-btn" id="ed-clear" title="Hapus semua format" style="color:#888">✕ Reset</button>
            </div>
            <div id="f-isi-editor" class="editor-content" contenteditable="true" data-placeholder="Tulis isi artikel di sini..."></div>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-cancel" class="btn-sec">Batal</button>
          <button type="submit" id="btn-save" class="btn-primary">Simpan Artikel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // ── FIREBASE CONFIG ──
    const firebaseConfig = {
      apiKey: "AIzaSyApw-QK0t92BUUkBns1zWNCa5AYGogd73A",
      authDomain: "kedaiatap-71258.firebaseapp.com",
      projectId: "kedaiatap-71258",
      storageBucket: "kedaiatap-71258.firebasestorage.app",
      messagingSenderId: "819999243734",
      appId: "1:819999243734:web:6eb91467237c6d91c03877"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const CATEGORY_LABELS = {
      kopi: '☕ Kopi', ruang: '🏠 Ruang', komunitas: '🤝 Komunitas', tips: '💡 Tips'
    };

    // ── AUTH STATE ──
    auth.onAuthStateChanged(user => {
      if (user) {
        document.getElementById('screen-login').style.display = 'none';
        const adminEl = document.getElementById('screen-admin');
        adminEl.style.display = 'flex';
        adminEl.style.flexDirection = 'column';
        document.getElementById('a-user-email').textContent = user.email;
        loadArticles();
      } else {
        document.getElementById('screen-login').style.display = 'flex';
        document.getElementById('screen-admin').style.display = 'none';
      }
    });

    // Email/Password Sign-In
    document.getElementById('btn-login').addEventListener('click', async () => {
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-pass').value;
      const errEl = document.getElementById('login-error');
      const btn = document.getElementById('btn-login');
      errEl.style.display = 'none';
      if (!email || !pass) {
        errEl.textContent = 'Email dan password wajib diisi.';
        errEl.style.display = 'block';
        return;
      }
      btn.textContent = 'Masuk...';
      btn.disabled = true;
      try {
        await auth.signInWithEmailAndPassword(email, pass);
      } catch (err) {
        const msgs = {
          'auth/user-not-found': 'Email tidak ditemukan.',
          'auth/wrong-password': 'Password salah.',
          'auth/invalid-email': 'Format email tidak valid.',
          'auth/invalid-credential': 'Email atau password salah.',
          'auth/too-many-requests': 'Terlalu banyak percobaan. Coba lagi nanti.'
        };
        errEl.textContent = msgs[err.code] || 'Login gagal: ' + err.message;
        errEl.style.display = 'block';
      } finally {
        btn.textContent = 'Masuk';
        btn.disabled = false;
      }
    });

    // Enter key on password field
    document.getElementById('login-pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });

    // Logout
    document.getElementById('btn-logout').addEventListener('click', () => auth.signOut());

    // ── ARTICLES CRUD ──
    let articlesCache = [];
    let editingId = null;

    async function loadArticles() {
      document.getElementById('a-list').innerHTML = '<div class="a-loading">Memuat artikel...</div>';
      try {
        const snap = await db.collection('articles').orderBy('createdAt', 'desc').get();
        articlesCache = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderList();
      } catch (e) {
        document.getElementById('a-list').innerHTML = '<div class="a-loading">Gagal memuat. Pastikan Firestore sudah diaktifkan.</div>';
        console.error(e);
      }
    }

    function renderList() {
      const list = document.getElementById('a-list');
      const count = document.getElementById('a-count');
      count.textContent = `(${articlesCache.length} artikel)`;

      if (articlesCache.length === 0) {
        list.innerHTML = `
          <div class="a-empty">
            <p>Belum ada artikel. Mulai tambahkan sekarang!</p>
          </div>`;
        return;
      }
      list.innerHTML = articlesCache.map(a => `
        <div class="a-item">
          <div class="a-item-info">
            <span class="a-cat-tag">${a.kategoriLabel || ''}</span>
            <span class="a-item-title" title="${a.judul}">${a.judul}</span>
            <span class="a-item-date">${a.tanggal || ''}</span>
          </div>
          <div class="a-item-actions">
            <button class="btn-edit" onclick="openModal('${a.id}')">Edit</button>
            <button class="btn-del" onclick="deleteArticle('${a.id}', '${a.judul.replace(/'/g, "\\'")}')">Hapus</button>
          </div>
        </div>
      `).join('');
    }

    // ── MODAL ──
    function openModal(id = null) {
      editingId = id;
      const form = document.getElementById('art-form');
      form.reset();
      document.getElementById('img-preview').style.display = 'none';
      const editor = document.getElementById('f-isi-editor');

      if (id) {
        const a = articlesCache.find(x => x.id === id);
        document.getElementById('modal-title').textContent = 'Edit Artikel';
        document.getElementById('f-judul').value = a.judul || '';
        document.getElementById('f-kategori').value = a.kategori || 'kopi';
        document.getElementById('f-tanggal').value = a.tanggal || '';
        document.getElementById('f-ringkasan').value = a.ringkasan || '';
        document.getElementById('f-gambar').value = a.gambar || '';
        editor.innerHTML = a.isi || '';
        if (a.gambar) {
          const prev = document.getElementById('img-preview');
          prev.src = a.gambar; prev.style.display = 'block';
        }
      } else {
        document.getElementById('modal-title').textContent = 'Tambah Artikel';
        editor.innerHTML = '';
        const now = new Date();
        document.getElementById('f-tanggal').value = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
      }

      document.getElementById('modal').style.display = 'flex';
      document.getElementById('f-judul').focus();
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
      editingId = null;
    }

    document.getElementById('btn-new').addEventListener('click', () => openModal());
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // Image preview
    document.getElementById('f-gambar').addEventListener('blur', () => {
      const url = document.getElementById('f-gambar').value.trim();
      const prev = document.getElementById('img-preview');
      if (url) { prev.src = url; prev.style.display = 'block'; }
      else { prev.style.display = 'none'; }
    });

    // Toolbar editor
    document.getElementById('editor-toolbar').addEventListener('mousedown', e => {
      const btn = e.target.closest('.ed-btn[data-cmd]');
      if (!btn) return;
      e.preventDefault();
      const cmd = btn.dataset.cmd;
      const val = btn.dataset.val || null;
      document.getElementById('f-isi-editor').focus();
      document.execCommand(cmd, false, val);
    });
    document.getElementById('ed-clear').addEventListener('mousedown', e => {
      e.preventDefault();
      if (confirm('Reset semua isi artikel?')) {
        document.getElementById('f-isi-editor').innerHTML = '';
        document.getElementById('f-isi-editor').focus();
      }
    });

    // Placeholder behavior
    const editorEl = document.getElementById('f-isi-editor');
    editorEl.addEventListener('focus', () => { if (editorEl.innerHTML === '') editorEl.classList.remove('editor-empty'); });
    editorEl.addEventListener('blur', () => {
      if (!editorEl.innerText.trim()) {
        editorEl.innerHTML = '';
      }
    });

    // Save article
    document.getElementById('art-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('btn-save');
      btn.textContent = 'Menyimpan...';
      btn.disabled = true;

      const kategori = document.getElementById('f-kategori').value;
      const tanggal = document.getElementById('f-tanggal').value.trim() ||
        new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

      const data = {
        judul: document.getElementById('f-judul').value.trim(),
        kategori,
        kategoriLabel: CATEGORY_LABELS[kategori],
        tanggal,
        ringkasan: document.getElementById('f-ringkasan').value.trim(),
        gambar: document.getElementById('f-gambar').value.trim(),
        isi: document.getElementById('f-isi-editor').innerHTML.trim(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        if (editingId) {
          await db.collection('articles').doc(editingId).update(data);
        } else {
          data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
          await db.collection('articles').add(data);
        }
        closeModal();
        await loadArticles();
      } catch (err) {
        alert('Gagal menyimpan: ' + err.message);
        console.error(err);
      } finally {
        btn.textContent = 'Simpan Artikel';
        btn.disabled = false;
      }
    });

    // Delete article
    async function deleteArticle(id, judul) {
      if (!confirm(`Hapus artikel "${judul}"?\n\nTindakan ini tidak bisa dibatalkan.`)) return;
      try {
        await db.collection('articles').doc(id).delete();
        await loadArticles();
      } catch (err) {
        alert('Gagal menghapus: ' + err.message);
      }
    }
  </script>

</body>
</html>
